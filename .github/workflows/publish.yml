name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "packages/expo-desktop/package.json"
      - "packages/expo-desktop/CHANGELOG.md"
      - "packages/expo-desktop-prebuild-config/package.json"
      - "packages/expo-desktop-prebuild-config/CHANGELOG.md"
      - "packages/expo-desktop-config-plugins/package.json"
      - "packages/expo-desktop-config-plugins/CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Matches the GitHub Environment name on each npm package’s "Trusted
    # publisher" config.
    environment: Stable Release
    permissions:
      # To push git tags
      contents: write
      # To publish to npm via OIDC
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages
        shell: bash
        run: |
          set +e
          bun run release:publish
          publish_exit=$?
          set -euo pipefail

          # Now push the local git tags that `changeset publish` generated.
          #
          # It's possible for some publishes to succeed and others to fail, so
          # we push the tags for any successes, and surface the exit code for
          # the overall operation.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mapfile -t release_tags < <(git tag -l "expo-desktop*@*")
          push_exit=0
          for tag in "${release_tags[@]}"; do
            [[ -n "$tag" ]] || continue
            [[ "$(git rev-parse "$tag^{commit}")" == "$GITHUB_SHA" ]] || continue
            git push origin "refs/tags/$tag" || push_exit=1
          done

          if [[ "$push_exit" -ne 0 ]]; then exit 1; fi
          exit "$publish_exit"
