name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "packages/expo-desktop/package.json"
      - "packages/expo-desktop/CHANGELOG.md"
      - "packages/expo-desktop-prebuild-config/package.json"
      - "packages/expo-desktop-prebuild-config/CHANGELOG.md"
      - "packages/expo-desktop-config-plugins/package.json"
      - "packages/expo-desktop-config-plugins/CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Matches the GitHub Environment name on each npm package’s "Trusted
    # publisher" config.
    environment: Stable Release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages
        run: bun run release:publish
