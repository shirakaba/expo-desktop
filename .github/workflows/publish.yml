name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "packages/expo-desktop/scripts/build-cli.mjs"
      - "packages/expo-desktop/tsconfig.build.json"
      - "packages/expo-desktop/package.json"
      - "packages/expo-desktop/CHANGELOG.md"
      - "packages/expo-desktop-prebuild-config/package.json"
      - "packages/expo-desktop-prebuild-config/CHANGELOG.md"
      - "packages/expo-desktop-config-plugins/package.json"
      - "packages/expo-desktop-config-plugins/CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Matches the GitHub Environment name on each npm package’s "Trusted
    # publisher" config.
    environment: Stable Release
    permissions:
      # To push git tags
      contents: write
      # To publish to npm via OIDC
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Changesets runs `npm publish --json`; npm hides most prepublishOnly output from the
      # job log (it goes to ~/.npm/_logs). This step always streams the same build to Actions.
      - name: Build expo-desktop (pre-flight, full log)
        working-directory: packages/expo-desktop
        run: node scripts/build-cli.mjs

      - name: Publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          publish: node --run release:publish

      - name: Publish failure diagnostics
        if: failure()
        run: |
          echo "==== packages/expo-desktop/expo-desktop-build.log ===="
          if [ -f packages/expo-desktop/expo-desktop-build.log ]; then
            cat packages/expo-desktop/expo-desktop-build.log
          else
            echo "(missing — build script never started or wrong working tree)"
          fi
          echo "==== newest npm debug log (tail 400 lines) ===="
          log=""
          if [ -d "$HOME/.npm/_logs" ]; then
            log="$(find "$HOME/.npm/_logs" -maxdepth 1 -name '*-debug-*.log' -type f -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2- || true)"
          fi
          if [ -n "${log}" ] && [ -f "${log}" ]; then
            echo "--- ${log} ---"
            tail -n 400 "${log}"
          else
            echo "(no npm debug log found)"
            ls -la "$HOME/.npm/_logs" 2>/dev/null || true
          fi
