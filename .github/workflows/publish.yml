name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "packages/expo-desktop/package.json"
      - "packages/expo-desktop/CHANGELOG.md"
      - "packages/expo-desktop-prebuild-config/package.json"
      - "packages/expo-desktop-prebuild-config/CHANGELOG.md"
      - "packages/expo-desktop-config-plugins/package.json"
      - "packages/expo-desktop-config-plugins/CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Matches the GitHub Environment name on each npm package’s "Trusted
    # publisher" config.
    environment: Stable Release
    permissions:
      # To push git tags
      contents: write
      # To publish to npm via OIDC
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages
        id: changesets
        # This action pushes the git tags after calling the publish command.
        # Changesets runs `npm publish --json`; npm often buffers lifecycle output into
        # ~/.npm/_logs instead of the job log, so we dump expo-desktop-build.log on failure.
        uses: changesets/action@v1
        with:
          publish: node --run release:publish

      - name: expo-desktop build log (on failure)
        if: failure()
        run: |
          echo "---- packages/expo-desktop/expo-desktop-build.log ----"
          if [ -f packages/expo-desktop/expo-desktop-build.log ]; then
            cat packages/expo-desktop/expo-desktop-build.log
          else
            echo "(log file missing — prepublishOnly may not have reached scripts/build-cli.mjs)"
          fi
          echo "---- npm debug log hint ----"
          echo "npm also writes full logs under ~/.npm/_logs/ on the runner (path is printed in the publish error)."
